version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: railyatra-postgres-prod
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:-railyatra}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-railyatra_secure_password}
      POSTGRES_DB: ${DATABASE_NAME:-railyatra_prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DATABASE_USER:-railyatra} -d $${DATABASE_NAME:-railyatra_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: railyatra-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: railyatra-qdrant-prod
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_prod_data:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY_IMAGE_BACKEND:-railyatra-backend}:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: railyatra-backend-prod
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-railyatra}:${DATABASE_PASSWORD:-railyatra_secure_password}@postgres:5432/${DATABASE_NAME:-railyatra_prod}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secure-production-jwt-key-123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    restart: always

  ai-service:
    image: ${REGISTRY_IMAGE_AI_SERVICE:-railyatra-ai-service}:${AI_SERVICE_IMAGE_TAG:-latest}
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: railyatra-ai-service-prod
    ports:
      - "8000:8000"
    environment:
      ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER:-railyatra}:${DATABASE_PASSWORD:-railyatra_secure_password}@postgres:5432/${DATABASE_NAME:-railyatra_prod}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
  qdrant_prod_data:
