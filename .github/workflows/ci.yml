name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd apps/backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd apps/backend
          npx prisma generate

      - name: Lint Code
        run: |
          cd apps/backend
          npm run lint

      - name: Run Unit Tests
        run: |
          cd apps/backend
          npm run test

  ai-service-ci:
    name: AI Service CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd apps/ai-service
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint Code
        run: |
          cd apps/ai-service
          ruff check .

      - name: Run Tests
        run: |
          cd apps/ai-service
          pytest

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd apps/frontend
          npm ci || npm install --legacy-peer-deps

      - name: Build Application
        run: |
          cd apps/frontend
          npm run build
