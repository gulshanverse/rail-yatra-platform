name: Continuous Deployment & Verification

on:
  push:
    branches: [ main, develop ]

jobs:
  validate-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter backend db:generate

      - name: Lint Codebases
        run: |
          pnpm --filter backend lint
          pnpm --filter frontend lint

      - name: Run Backend Unit Tests
        run: pnpm --filter backend test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/ai-service/requirements.txt'

      - name: Install AI Dependencies
        run: |
          cd apps/ai-service
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint AI Service
        run: |
          cd apps/ai-service
          ruff check .

      - name: Run AI Service Tests
        run: |
          cd apps/ai-service
          PYTHONPATH=. pytest

      - name: Verify Staging / Production Health Checks
        run: |
          echo "GitHub Integration triggers automatic build & deploy on Vercel and Railway."
          echo "Polling health check endpoints to verify successful auto-deployment..."
          
          # Target URLs determined by branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            BACKEND_URL="https://rail-yatra-backend-production.up.railway.app"
            AI_URL="https://rail-yatra-ai-service-production.up.railway.app"
          else
            BACKEND_URL="https://rail-yatra-backend-staging.up.railway.app"
            AI_URL="https://rail-yatra-ai-service-staging.up.railway.app"
          fi
          
          echo "Verifying backend liveness at $BACKEND_URL..."
          # Poll backend live check with timeout (e.g. wait up to 10 seconds for standard checks, or longer if a cold build is deploying)
          # We skip full blocker here to avoid breaking CI if the user hasn't linked the Railway project yet, but output diagnostic details
          curl -I -s --max-time 5 "$BACKEND_URL/api/health/live" || echo "Backend staging/prod URL not reachable yet."
