name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_HOST }}/railyatra-backend:latest,${{ secrets.REGISTRY_HOST }}/railyatra-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push AI Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/ai-service
          file: ./apps/ai-service/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_HOST }}/railyatra-ai-service:latest,${{ secrets.REGISTRY_HOST }}/railyatra-ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/railyatra
            # Pull latest configurations
            git pull origin main
            
            # Export build tag env
            export BACKEND_IMAGE_TAG=${{ github.sha }}
            export AI_SERVICE_IMAGE_TAG=${{ github.sha }}
            
            # Stop, migrate, build & launch
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up --no-start postgres redis qdrant
            docker-compose -f docker-compose.prod.yml start postgres redis qdrant
            
            # Await database liveness and run migrations
            docker-compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy
            
            # Start backend and AI service
            docker-compose -f docker-compose.prod.yml up -d backend ai-service
            
            # Run smoke test runner script
            powershell -File ./scripts/smoke-test.ps1
